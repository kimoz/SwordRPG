<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Edge: Cyber-Strengthening</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="cyberpunk-theme">
    <div id="scanline"></div>
    <div id="vignette"></div>

    <div class="container">
        <header>
            <h1 class="glitch" data-text="NEON EDGE">NEON EDGE</h1>
            <p class="subtitle">PROJECT_BLADE_ENHANCEMENT_V2.0</p>
        </header>

        <div class="main-grid">
            <!-- Left Side: Status Panel -->
            <section class="status-panel card">
                <div class="panel-header">
                    <h2 class="neon-text-blue">RUNNER_DATA</h2>
                    <button id="btn-achievements" class="cyber-btn achievement-btn">업적_현황</button>
                </div>
                <div class="stat-group">
                    <label>사용자_ID <span id="btn-edit-name" class="edit-icon" style="cursor: pointer; opacity: 0.6; font-size: 0.6rem; margin-left: 5px;">(수정)</span></label>
                    <span id="player-id">CYBER_RUNNER_01</span>
                </div>
                <div class="stat-group">
                    <label>참여_스쿼드 <span id="btn-edit-squad" class="edit-icon" style="cursor: pointer; opacity: 0.6; font-size: 0.6rem; margin-left: 5px;">(변경)</span></label>
                    <span id="squad-name" class="neon-text-pink">SOLO_MODE</span>
                    <span id="btn-copy-invite" class="edit-icon" style="cursor: pointer; opacity: 0.8; font-size: 0.7rem; color: var(--neon-blue); display: none; margin-left: 10px;">[초대]</span>
                </div>
                <div class="stat-group">
                    <label>크레딧</label>
                    <span id="credits" class="neon-text">1000</span> <span class="unit">₵</span>
                </div>
                <div class="stat-group">
                    <label>블레이드_레벨</label>
                    <span id="blade-level" class="neon-text-blue">0</span>
                </div>
                <div class="stat-group">
                    <label>사이버_운(보너스)</label>
                    <span id="prob-bonus" class="neon-text-green">0.00</span> <span class="unit">%</span>
                </div>
                <div class="stat-group">
                    <label>해킹_숙련도</label>
                    <div class="progress-bar-container">
                        <div id="xp-bar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="visual-blade">
                    <div id="blade-preview"></div>
                </div>
                <button id="btn-sell" class="cyber-btn sell" style="margin-top: 15px; width: 100%;">
                    <span class="btn-text">무기_판매</span>
                    <span class="btn-value">가치: 0₵</span>
                </button>
            </section>

            <!-- Center/Right: Terminal & Actions -->
            <div class="action-center">
                <section class="terminal card">
                    <div class="terminal-header">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                        <span class="terminal-title">터미널_출력</span>
                    </div>
                    <div id="log-window" class="log-window">
                        <p class="log-entry system">> 시스템 초기화 중...</p>
                        <p class="log-entry system">> 언더시티에 오신 것을 환영합니다...</p>
                    </div>
                </section>

                <section class="action-grid">
                    <button id="btn-enhance" class="cyber-btn enhance">
                        <span class="btn-text">블레이드_강화</span>
                        <span class="btn-cost">비용: 100₵</span>
                    </button>
                    <button id="btn-hack" class="cyber-btn hack">
                        <span class="btn-text">데이터_뱅크_해킹</span>
                        <span class="btn-status">대기 중</span>
                    </button>
                    <button id="btn-market" class="cyber-btn market">
                        <span class="btn-text">도감</span>
                    </button>
                    <button id="btn-show-rankings" class="cyber-btn enhance" style="border-color: var(--neon-blue);">
                        <span class="btn-text">순위</span>
                    </button>
                    <button id="btn-open-share" class="cyber-btn hack" style="border-color: var(--neon-pink);">
                        <span class="btn-text">공유</span>
                    </button>
                </section>
            </div>
        </div>
    </div>

    <!-- Overlay for effects -->
    <div id="glitch-overlay" class="hidden"></div>

    <!-- Static UI Elements -->
    <div id="codex-overlay" class="overlay hidden">
        <div class="codex-modal card">
            <button id="btn-close-codex-x" class="codex-close-x">&times;</button>
            <div class="codex-header">
                <h2 class="neon-text-blue">WEAPON_CODEX</h2>
                <div id="codex-stats" class="milestone-bonus">발견된 무기: 0 / 70</div>
            </div>
            
            <div class="codex-tabs">
                <button class="codex-tab active" data-cat="all">전체</button>
                <button class="codex-tab" data-cat="normal">일반</button>
                <button class="codex-tab" data-cat="hidden">히든</button>
            </div>
            
            <div id="codex-list" class="codex-grid">
                <!-- Weapons will be rendered here -->
            </div>
            <button id="btn-close-codex" class="cyber-btn" style="margin-top: 15px;">닫기</button>
        </div>
    </div>
    
    <!-- Achievement Modal -->
    <div id="achievement-overlay" class="overlay hidden">
        <div class="achievement-modal card">
            <h2 class="neon-text">CYBER_ACHIEVEMENTS</h2>
            
            <!-- Milestone Reward Bar -->
            <div class="milestone-container">
                <div class="milestone-info">
                    전체 달성률: <span id="ach-total-progress">0</span>%
                    <span id="milestone-next-bonus" class="milestone-bonus">(다음 보상: 25% 달성 시 +1M₵)</span>
                </div>
                <div class="ach-progress-bg main-progress">
                    <div id="ach-main-bar" class="ach-progress-bar" style="width: 0%"></div>
                    <div class="milestone-markers">
                        <span class="marker" style="left: 25%">25%</span>
                        <span class="marker" style="left: 50%">50%</span>
                        <span class="marker" style="left: 75%">75%</span>
                        <span class="marker" style="left: 100%">100%</span>
                    </div>
                </div>
            </div>

            <!-- Category Tabs -->
            <div class="achievement-tabs">
                <button class="ach-tab active" data-cat="all">전체</button>
                <button class="ach-tab" data-cat="enhance">강화</button>
                <button class="ach-tab" data-cat="hack">해킹</button>
                <button class="ach-cat-btn ach-tab" data-cat="wealth">재력</button>
                <button class="ach-tab" data-cat="collect">수집</button>
                <button class="ach-tab" data-cat="unlucky">운</button>
            </div>

            <div id="achievement-list" class="achievement-list">
                <!-- Injected via game.js -->
            </div>
            <button id="btn-close-achievements" class="cyber-btn" style="margin-top: 15px;">닫기</button>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div id="ranking-overlay" class="overlay hidden">
        <div class="ranking-modal card">
            <button id="btn-close-ranking" class="codex-close-x">&times;</button>
            <h2 class="neon-text">SQUAD_RANKINGS</h2>
            <p id="ranking-subtitle" class="milestone-bonus" style="margin-bottom: 20px;">스쿼드 명성 데이터</p>
            <div id="ranking-list" class="ranking-list">
                <!-- Rankings injected via js -->
            </div>
        </div>
    </div>

    <!-- Share Card Modal -->
    <div id="share-card-overlay" class="overlay hidden">
        <div class="share-modal card">
            <button id="btn-close-share" class="codex-close-x">&times;</button>
            <div id="runner-card-content" class="runner-card-content">
                <!-- Card content injected via js -->
            </div>
            <button id="btn-copy-card" class="cyber-btn" style="margin-top: 15px; width: 100%;">상태_데이터_복사</button>
        </div>
    </div>
    
    <!-- Firebase SDK (Compat Version for Easy Integration) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script src="secrets.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
